  REGISTRY_LOGIN_SERVER: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name to lowercase
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/erp-frontend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v6
        with:
          context: ./erp-frontend
          push: true
          tags: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          file: ./erp-frontend/Dockerfile
          build-args: |
            VITE_GRAPHQL_ENDPOINT=/graphql

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set image names to lowercase
        run: |
          echo "BACKEND_IMAGE_NAME=$(echo '${{ github.repository }}/app-gateway' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE_NAME=$(echo '${{ github.repository }}/erp-frontend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Execute Docker Compose on Azure VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            # Ensure the docker directory exists
            mkdir -p ~/erp-deployment
            cd ~/erp-deployment

            # Login to Github Container Registry
            echo "${{ secrets.GH_PAT_FOR_VM }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Create/Update the .env file from GitHub secrets
            cat > .env << 'ENVFILE'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            BIND_ADDR=0.0.0.0:8080
            BACKEND_IMAGE=ghcr.io/${{ env.BACKEND_IMAGE_NAME }}:latest
            FRONTEND_IMAGE=ghcr.io/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            ENVFILE

            # Create/Update docker compose with frontend, backend, and edge proxy
            cat > docker-compose.yml << 'COMPOSE'
            services:
              app-gateway:
                image: ${BACKEND_IMAGE}
                container_name: erp-app-gateway
                restart: always
                env_file:
                  - .env
                expose:
                  - "8080"
                networks:
                  - erp-net

              frontend:
                image: ${FRONTEND_IMAGE}
                container_name: erp-frontend
                restart: always
                expose:
                  - "80"
                networks:
                  - erp-net

              nginx-proxy:
                image: nginx:1.27-alpine
                container_name: erp-nginx-proxy
                restart: always
                depends_on:
                  - frontend
                  - app-gateway
                ports:
                  - "80:80"
                volumes:
                  - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
                networks:
                  - erp-net

            networks:
              erp-net:
                name: erp-net
            COMPOSE

            # Create/Update nginx reverse proxy config
            cat > nginx.conf << 'NGINX'
            server {
              listen 80;
              server_name _;

              client_max_body_size 20m;

              location /graphql {
                proxy_pass http://app-gateway:8080/graphql;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }

              location /uploads/ {
                proxy_pass http://app-gateway:8080/uploads/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }

              location / {
                proxy_pass http://frontend:80;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
            }
            NGINX

            echo "Pulling the latest images..."
            docker pull ${BACKEND_IMAGE}
            docker pull ${FRONTEND_IMAGE}

            echo "Starting docker compose..."
            docker compose up -d --remove-orphans
