name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'app-gateway/**'
      - 'deployment/docker-compose.yml'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO}/app-gateway:${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-backend-${{ github.sha }}
          restore-keys: buildx-backend-

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./app-gateway
          file: ./app-gateway/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ github.repository_owner }}/app-gateway:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - run: rm -rf /tmp/.buildx-cache && mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y -qq sshpass

      - name: Write .env
        run: |
          cat > /tmp/deploy.env << 'EOF'
          DATABASE_URL=${{ secrets.APP_DATABASE_URL }}
          JWT_SECRET=${{ secrets.APP_JWT_SECRET }}
          BIND_ADDR=0.0.0.0:8080
          S3_ENDPOINT=http://minio:9000
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET=erp-uploads
          CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          BACKEND_IMAGE=${{ needs.build-and-push.outputs.image }}
          EOF

      - name: Copy deployment files to VM
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          DEPLOY_PORT=22
          DEPLOY_HOST="${{ secrets.DEPLOY_HOST }}"

          SSH_BASE_OPTS="-4 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes -o IPQoS=none -o PreferredAuthentications=password -o PubkeyAuthentication=no -o ConnectionAttempts=1"

          retry() {
            local attempts="$1"
            shift
            local n=1
            while true; do
              "$@" && break
              if [ "$n" -ge "$attempts" ]; then
                echo "Command failed after ${attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${n}/${attempts} failed. Retrying in 8s..."
              n=$((n + 1))
              sleep 8
            done
          }

          echo "Checking SSH reachability: $DEPLOY_HOST:$DEPLOY_PORT"
          timeout 10 bash -lc "cat < /dev/null > /dev/tcp/$DEPLOY_HOST/$DEPLOY_PORT" || {
            echo "Cannot open TCP connection to $DEPLOY_HOST:$DEPLOY_PORT from GitHub runner."
            echo "Check VM firewall/NSG/UFW, SSHD status, and whether DEPLOY_PORT is correct."
            exit 1
          }

          echo "Checking SSH banner/key response from $DEPLOY_HOST:$DEPLOY_PORT"
          if ! timeout 12 ssh-keyscan -4 -T 10 -p "$DEPLOY_PORT" "$DEPLOY_HOST" > /tmp/ssh-keyscan.out 2>/tmp/ssh-keyscan.err; then
            echo "SSH keyscan failed. TCP port is open but SSH did not complete handshake."
            echo "Likely causes: wrong host/port target, Cloudflare proxy in front of DNS, SSHD not healthy, or network middlebox."
            echo "--- ssh-keyscan stderr ---"
            cat /tmp/ssh-keyscan.err || true
            exit 1
          fi

          if [ ! -s /tmp/ssh-keyscan.out ]; then
            echo "SSH keyscan returned no host keys; this endpoint may not be an SSH server."
            echo "Use the VM public IP or a DNS record that points directly to the VM (no proxy)."
            exit 1
          fi

          retry 3 sshpass -e ssh -p "$DEPLOY_PORT" $SSH_BASE_OPTS ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p ~/erp-deployment"
          retry 3 sshpass -e scp -P "$DEPLOY_PORT" $SSH_BASE_OPTS /tmp/deploy.env deployment/docker-compose.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/erp-deployment/

      - name: Deploy via SSH
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          DEPLOY_PORT=22
          DEPLOY_HOST="${{ secrets.DEPLOY_HOST }}"

          SSH_BASE_OPTS="-4 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes -o IPQoS=none -o PreferredAuthentications=password -o PubkeyAuthentication=no -o ConnectionAttempts=1"

          retry() {
            local attempts="$1"
            shift
            local n=1
            while true; do
              "$@" && break
              if [ "$n" -ge "$attempts" ]; then
                echo "Command failed after ${attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${n}/${attempts} failed. Retrying in 8s..."
              n=$((n + 1))
              sleep 8
            done
          }

          retry 3 sshpass -e ssh -p "$DEPLOY_PORT" $SSH_BASE_OPTS ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -e
            cd ~/erp-deployment
            mv deploy.env .env
            echo '${{ secrets.DEPLOY_GH_PAT }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            docker pull '${{ needs.build-and-push.outputs.image }}'
            docker compose up -d --remove-orphans
            docker image prune -f --filter 'until=24h'
            echo '── Containers running ──'
            docker compose ps
          "
