name: Deploy Backend to Azure VM

on:
  push:
    branches:
      - main
    paths:
      - 'app-gateway/**'
      - 'deployment/docker-compose.yml'
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name to lowercase
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/app-gateway' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v6
        with:
          context: ./app-gateway
          push: true
          tags: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          file: ./app-gateway/Dockerfile
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Temp fix to prevent cache growing infinitely
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set image name to lowercase
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/app-gateway' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Execute Docker Compose on Azure VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            # Ensure the docker directory exists
            mkdir -p ~/erp-deployment
            cd ~/erp-deployment

            # Login to Github Container Registry
            echo "${{ secrets.GH_PAT_FOR_VM }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Create/Update the docker-compose file
            cat << 'COMPOSE' > docker-compose.yml
            version: '3.8'
            services:
              app-gateway:
                image: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
                container_name: erp-app-gateway
                restart: always
                ports:
                  - "8080:8080"
                env_file:
                  - .env
            COMPOSE

            echo "Pulling the latest image..."
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

            echo "Starting docker compose..."
            docker compose up -d --remove-orphans
