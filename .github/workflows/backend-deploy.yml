name: Deploy Backend to Azure VM

on:
  push:
    branches:
      - main
    paths:
      - 'app-gateway/**'
      - 'deployment/docker-compose.yml'
      - 'deployment/nginx.conf'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "backend_image=${{ env.REGISTRY }}/${REPO_LC}/app-gateway:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "backend_image_latest=${{ env.REGISTRY }}/${REPO_LC}/app-gateway:latest" >> $GITHUB_OUTPUT
          echo "frontend_image=${{ env.REGISTRY }}/${REPO_LC}/erp-frontend:latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-backend-${{ hashFiles('app-gateway/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-backend-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./app-gateway
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.meta.outputs.backend_image_latest }}
          file: ./app-gateway/Dockerfile
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Transfer configs and deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMG: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMG: ${{ needs.build-and-push.outputs.frontend_image }}
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_VM }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          envs: BACKEND_IMG,FRONTEND_IMG,GH_TOKEN,GH_REPO,GH_SHA
          script: |
            set -e
            mkdir -p ~/erp-deployment
            cd ~/erp-deployment

            # Download deployment files directly from the repo
            curl -sfL -H "Authorization: token ${GH_TOKEN}" \
              "https://raw.githubusercontent.com/${GH_REPO}/${GH_SHA}/deployment/docker-compose.yml" \
              -o docker-compose.yml
            curl -sfL -H "Authorization: token ${GH_TOKEN}" \
              "https://raw.githubusercontent.com/${GH_REPO}/${GH_SHA}/deployment/nginx.conf" \
              -o nginx.conf

            # Verify files are not empty
            test -s docker-compose.yml || { echo "ERROR: docker-compose.yml is empty"; exit 1; }
            test -s nginx.conf || { echo "ERROR: nginx.conf is empty"; exit 1; }
            echo "==> Deployment files downloaded ($(wc -c < docker-compose.yml) bytes compose, $(wc -c < nginx.conf) bytes nginx)"

            # Login to GitHub Container Registry
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Write .env file — no leading spaces!
            printf '%s\n' \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              "BIND_ADDR=0.0.0.0:8080" \
              "UPLOADS_DIR=/app/uploads" \
              "BACKEND_IMAGE=${BACKEND_IMG}" \
              "FRONTEND_IMAGE=${FRONTEND_IMG}" \
              > .env

            echo "==> Pulling images..."
            docker pull "${BACKEND_IMG}"
            docker pull "${FRONTEND_IMG}"

            echo "==> Starting services..."
            docker compose up -d --remove-orphans --force-recreate app-gateway nginx-proxy

            echo "==> Waiting for health checks (30s)..."
            sleep 30

            echo "==> Container status:"
            docker compose ps

            echo "==> Cleaning up old images..."
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            echo "==> Health check..."
            curl -sf http://localhost/health || { echo "FAILED: Nginx health check"; exit 1; }
            echo ""
            echo "==> Frontend check..."
            curl -sf -o /dev/null -w "HTTP %{http_code}" http://localhost/ || { echo "FAILED: Frontend unreachable"; exit 1; }
            echo ""
            echo "==> GraphQL check..."
            curl -sf -o /dev/null -w "HTTP %{http_code}" -X POST http://localhost/graphql -H "Content-Type: application/json" -d '{"query":"{ __typename }"}' || { echo "WARNING: GraphQL endpoint returned non-200"; }
            echo ""
            echo "==> All checks passed!"
