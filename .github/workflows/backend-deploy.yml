name: Deploy Backend to Azure VM

on:
  push:
    branches:
      - main
    paths:
      - 'app-gateway/**'
      - 'deployment/docker-compose.yml'
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/app-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v4
        with:
          context: ./app-gateway
          push: true
          tags: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          file: ./app-gateway/Dockerfile
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Temp fix to prevent cache growing infinitely
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Execute Docker Compose on Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            # Ensure the docker directory exists
            mkdir -p ~/erp-deployment
            cd ~/erp-deployment
            
            # Login to Github Container Registry using a Personal Access Token stored as a secret on the VM, or passed here.
            echo "${{ secrets.GH_PAT_FOR_VM }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # Create/Update the docker-compose file inline (or use scp action before this)
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              app-gateway:
                image: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                container_name: erp-app-gateway
                restart: always
                ports:
                  - "8080:8080"
                env_file:
                  - .env
            EOF
            
            echo "Pulling the latest image..."
            docker pull ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            
            echo "Starting docker-compose..."
            docker-compose up -d --remove-orphans
