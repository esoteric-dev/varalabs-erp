name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'app-gateway/**'
      - 'deployment/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────
# REQUIRED SECRETS (set in GitHub → Settings → Secrets → Actions):
#
#   DEPLOY_HOST        Azure VM public IP address
#   DEPLOY_USER        SSH username (e.g. azureuser)
#   DEPLOY_PASSWORD    SSH password for the VM
#   DEPLOY_GH_PAT     GitHub PAT with read:packages scope
#   APP_DATABASE_URL   PostgreSQL connection string
#   APP_JWT_SECRET     JWT signing secret
# ──────────────────────────────────────────────────────────────────

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_latest: ${{ steps.meta.outputs.image_latest }}
      frontend_latest: ${{ steps.meta.outputs.frontend_latest }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=${{ env.REGISTRY }}/${REPO}/app-gateway:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image_latest=${{ env.REGISTRY }}/${REPO}/app-gateway:latest" >> $GITHUB_OUTPUT
          echo "frontend_latest=${{ env.REGISTRY }}/${REPO}/erp-frontend:latest" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-backend-${{ hashFiles('app-gateway/Cargo.lock') }}
          restore-keys: buildx-backend-

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app-gateway
          file: ./app-gateway/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - run: rm -rf /tmp/.buildx-cache && mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # Step 1: Copy docker-compose.yml and nginx.conf to the VM
      - name: Copy deployment files
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
          sshpass -e ssh $SSH_OPTS ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p ~/erp-deployment"
          sshpass -e scp $SSH_OPTS deployment/docker-compose.yml deployment/nginx.conf \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/erp-deployment/
          echo "✓ Deployment files copied"

      # Step 2: SSH into VM → write .env, pull images, start containers
      - name: Deploy containers
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMG: ${{ needs.build.outputs.image_tag }}
          FRONTEND_IMG: ${{ needs.build.outputs.frontend_latest }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: BACKEND_IMG,FRONTEND_IMG
          script: |
            set -e
            cd ~/erp-deployment

            echo "── Verifying files ──"
            test -s docker-compose.yml && test -s nginx.conf
            echo "docker-compose.yml: $(wc -c < docker-compose.yml) bytes"
            echo "nginx.conf:         $(wc -c < nginx.conf) bytes"

            echo "── Writing .env ──"
            printf '%s\n' \
              "DATABASE_URL=${{ secrets.APP_DATABASE_URL }}" \
              "JWT_SECRET=${{ secrets.APP_JWT_SECRET }}" \
              "BIND_ADDR=0.0.0.0:8080" \
              "UPLOADS_DIR=/app/uploads" \
              "RUST_LOG=app_gateway=info,tower_http=info" \
              "BACKEND_IMAGE=${BACKEND_IMG}" \
              "FRONTEND_IMAGE=${FRONTEND_IMG}" \
              > .env

            echo "── Docker login ──"
            echo "${{ secrets.DEPLOY_GH_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "── Pulling images ──"
            docker pull "${BACKEND_IMG}"
            docker pull "${FRONTEND_IMG}"

            echo "── Starting services ──"
            docker compose up -d --remove-orphans --force-recreate app-gateway nginx-proxy

            echo "── Waiting for containers to stabilise (30s) ──"
            sleep 30
            docker compose ps

            echo "── Pruning old images ──"
            docker image prune -f --filter "until=24h"

      # Step 3: Verify the deployment is healthy
      - name: Health checks
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            set -e
            echo "── Health ──"
            curl -sf http://localhost/health && echo " OK"
            echo "── Frontend ──"
            curl -sf -o /dev/null -w "%{http_code}" http://localhost/ && echo " OK"
            echo "── GraphQL ──"
            curl -sf -o /dev/null -w "%{http_code}" \
              -X POST http://localhost/graphql \
              -H "Content-Type: application/json" \
              -d '{"query":"{ __typename }"}' && echo " OK"
            echo "✓ All checks passed"
