# ─── Rate Limiting ────────────────────────────────────────────────
# 10 requests/second per IP, burst of 20
limit_req_zone $binary_remote_addr zone=graphql_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

# ─── Gzip Compression ────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml;

server {
  listen 80;
  server_name *.varalabs.dev varalabs.dev;

  client_max_body_size 20m;

  # ─── Security Headers ────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # ─── Cloudflare Real IP Restoration ──────────────────────────
  # Cloudflare IPv4 ranges (update periodically from https://cloudflare.com/ips)
  set_real_ip_from 173.245.48.0/20;
  set_real_ip_from 103.21.244.0/22;
  set_real_ip_from 103.22.200.0/22;
  set_real_ip_from 103.31.4.0/22;
  set_real_ip_from 141.101.64.0/18;
  set_real_ip_from 108.162.192.0/18;
  set_real_ip_from 190.93.240.0/20;
  set_real_ip_from 188.114.96.0/20;
  set_real_ip_from 197.234.240.0/22;
  set_real_ip_from 198.41.128.0/17;
  set_real_ip_from 162.158.0.0/15;
  set_real_ip_from 104.16.0.0/13;
  set_real_ip_from 104.24.0.0/14;
  set_real_ip_from 172.64.0.0/13;
  set_real_ip_from 131.0.72.0/22;
  real_ip_header CF-Connecting-IP;

  # ─── GraphQL API ─────────────────────────────────────────────
  location /graphql {
    limit_req zone=graphql_limit burst=20 nodelay;

    proxy_pass http://app-gateway:8080/graphql;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts for long-running queries
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # ─── File Uploads API ───────────────────────────────────────
  location /api/ {
    limit_req zone=upload_limit burst=10 nodelay;

    proxy_pass http://app-gateway:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Larger timeout for file uploads
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # ─── Uploaded Files (Static Serving) ─────────────────────────
  location /uploads/ {
    proxy_pass http://app-gateway:8080/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Cache uploaded files in browser
    proxy_cache_valid 200 1h;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  # ─── Frontend SPA ───────────────────────────────────────────
  location / {
    proxy_pass http://frontend:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://frontend:80;
      expires 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
    }
  }

  # ─── Health Check Endpoint ──────────────────────────────────
  location /health {
    access_log off;
    return 200 "ok";
    add_header Content-Type text/plain;
  }
}
