# ─── HTTPS Server for API Subdomain (Android / mobile clients) ──
server {
  listen 443 ssl;
  server_name api.varalabs.dev;

  # Use Docker embedded DNS so container IPs are re-resolved after restarts
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Cloudflare Origin Certificate
  ssl_certificate     /etc/nginx/ssl/origin.pem;
  ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  client_max_body_size 20m;

  # ─── Security Headers ────────────────────────────────────────
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ─── CORS Headers (required for any WebView / hybrid clients) ─
  add_header Access-Control-Allow-Origin  "*" always;
  add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

  # ─── Cloudflare Real IP Restoration ──────────────────────────
  set_real_ip_from 173.245.48.0/20;
  set_real_ip_from 103.21.244.0/22;
  set_real_ip_from 103.22.200.0/22;
  set_real_ip_from 103.31.4.0/22;
  set_real_ip_from 141.101.64.0/18;
  set_real_ip_from 108.162.192.0/18;
  set_real_ip_from 190.93.240.0/20;
  set_real_ip_from 188.114.96.0/20;
  set_real_ip_from 197.234.240.0/22;
  set_real_ip_from 198.41.128.0/17;
  set_real_ip_from 162.158.0.0/15;
  set_real_ip_from 104.16.0.0/13;
  set_real_ip_from 104.24.0.0/14;
  set_real_ip_from 172.64.0.0/13;
  set_real_ip_from 131.0.72.0/22;
  real_ip_header CF-Connecting-IP;

  # ─── Mobile Auth Endpoints ────────────────────────────────────
  # Separate, tighter rate limit zone to deter credential stuffing.
  location /api/mobile/auth {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin  "*";
      add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS";
      add_header Access-Control-Allow-Headers "Authorization, Content-Type";
      add_header Access-Control-Max-Age 86400;
      add_header Content-Length 0;
      add_header Content-Type text/plain;
      return 204;
    }

    limit_req zone=mobile_auth_limit burst=10 nodelay;

    set $backend http://app-gateway:8080;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  # ─── All Other API Endpoints ──────────────────────────────────
  location /api/ {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin  "*";
      add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS";
      add_header Access-Control-Allow-Headers "Authorization, Content-Type";
      add_header Access-Control-Max-Age 86400;
      add_header Content-Length 0;
      add_header Content-Type text/plain;
      return 204;
    }

    limit_req zone=upload_limit burst=20 nodelay;

    set $backend http://app-gateway:8080;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # ─── GraphQL API ─────────────────────────────────────────────
  location /graphql {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin  "*";
      add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS";
      add_header Access-Control-Allow-Headers "Authorization, Content-Type";
      add_header Access-Control-Max-Age 86400;
      add_header Content-Length 0;
      add_header Content-Type text/plain;
      return 204;
    }

    limit_req zone=graphql_limit burst=20 nodelay;

    set $backend http://app-gateway:8080;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # ─── Uploaded Files (photos, documents) ──────────────────────
  location /uploads/ {
    set $backend http://app-gateway:8080;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_cache_valid 200 1h;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  # ─── Health Check ─────────────────────────────────────────────
  location /health {
    access_log off;
    return 200 "ok";
    add_header Content-Type text/plain;
  }

  # ─── Block everything else (no frontend on API subdomain) ─────
  location / {
    return 404;
  }
}
