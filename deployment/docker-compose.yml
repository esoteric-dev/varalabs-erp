services:
  app-gateway:
    image: ${BACKEND_IMAGE}
    container_name: erp-app-gateway
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - erp-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: erp-minio
    restart: always
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    volumes:
      - minio-data:/data
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # Creates the S3 bucket on first run (idempotent)
  minio-init:
    image: minio/mc:latest
    container_name: erp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin123} 2>/dev/null; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${S3_BUCKET:-erp-uploads};
      mc anonymous set public local/${S3_BUCKET:-erp-uploads};
      echo 'Bucket initialized';
      exit 0;
      "
    networks:
      - erp-net

  # Cloudflare Tunnel — exposes backend to Cloudflare without open ports
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: erp-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - erp-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  minio-data:
    name: erp-minio-data

networks:
  erp-net:
    name: erp-net
