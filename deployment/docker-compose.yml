services:
  app-gateway:
    image: ${BACKEND_IMAGE}
    container_name: erp-app-gateway
    restart: always
    env_file:
      - .env
    expose:
      - "8080"
    networks:
      - erp-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: erp-frontend
    restart: always
    expose:
      - "80"
    networks:
      - erp-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: erp-minio
    restart: always
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    volumes:
      - minio-data:/data
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # Creates the S3 bucket on first run (idempotent)
  minio-init:
    image: minio/mc:latest
    container_name: erp-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin123};
      mc mb --ignore-existing local/${S3_BUCKET:-erp-uploads};
      mc anonymous set public local/${S3_BUCKET:-erp-uploads};
      exit 0;
      "
    networks:
      - erp-net

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: erp-nginx-proxy
    restart: always
    depends_on:
      - frontend
      - app-gateway
      - minio
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - erp-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  minio-data:
    name: erp-minio-data

networks:
  erp-net:
    name: erp-net
