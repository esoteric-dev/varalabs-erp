services:
  app-gateway:
    image: ${BACKEND_IMAGE}
    container_name: erp-app-gateway
    restart: always
    env_file:
      - .env
    expose:
      - "8080"
    volumes:
      - uploads-data:/app/uploads
    networks:
      - erp-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: erp-frontend
    restart: always
    expose:
      - "80"
    networks:
      - erp-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: erp-nginx-proxy
    restart: always
    depends_on:
      - frontend
      - app-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - erp-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  uploads-data:
    name: erp-uploads-data

networks:
  erp-net:
    name: erp-net
