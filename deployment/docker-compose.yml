services:
  app-gateway:
    image: ${BACKEND_IMAGE}
    container_name: erp-app-gateway
    restart: always
    env_file:
      - .env
    expose:
      - "8080"
    volumes:
      - uploads-data:/app/uploads
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/graphql"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: erp-frontend
    restart: always
    expose:
      - "80"
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: erp-nginx-proxy
    restart: always
    depends_on:
      frontend:
        condition: service_healthy
      app-gateway:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  uploads-data:
    name: erp-uploads-data

networks:
  erp-net:
    name: erp-net
